services:
      zookeeper:
            image: confluentinc/cp-zookeeper:7.6.1
            environment:
                  ZOOKEEPER_CLIENT_PORT: 2181
                  ZOOKEEPER_TICK_TIME: 2000
            ports:
                  - "2181:2181"
            volumes:
                  - zookeeper_data:/var/lib/zookeeper/data
                  - zookeeper_log:/var/lib/zookeeper/log
      kafka:
            image: confluentinc/cp-kafka:7.6.1
            depends_on:
                  - zookeeper
            environment:
                  KAFKA_BROKER_ID: 1
                  KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
                  KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
                  KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
                  KAFKA_ADVERTISED_LISTENERS: PLAINTEXT_HOST://localhost:9092,PLAINTEXT://kafka:29092
                  KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
                  KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
            ports:
                  - "9092:9092"
            volumes:
                  - kafka_data:/var/lib/kafka/data
            healthcheck:
                  test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
                  interval: 5s
                  timeout: 10s
                  retries: 5
      kafka-init:
            image: confluentinc/cp-kafka:7.6.1
            depends_on:
                  kafka:
                        condition: service_healthy
            entrypoint: ["/bin/sh", "-c"]
            command: >
                  "kafka-topics --create --if-not-exists --topic parkflow.events.raw --bootstrap-server kafka:29092 --partitions 1 --replication-factor 1"
      postgres:
            image: postgres:16
            environment:
                  POSTGRES_DB: parkflow
                  POSTGRES_USER: parkflow_user
                  POSTGRES_PASSWORD: parkflow_password
            ports:
                  - "5432:5432"
            volumes:
                  - postgres_data:/var/lib/postgresql/data
      spark:
            image: apache/spark:4.0.0
            user: root
            depends_on:
                  kafka:
                        condition: service_healthy
                  kafka-init:
                        condition: service_completed_successfully
                  postgres:
                        condition: service_started
            volumes:
                  - ./spark:/opt/spark-apps
                  - spark-ivy:/opt/ivy
            command: >
                  /opt/spark/bin/spark-submit
                  --conf spark.jars.ivy=/opt/ivy
                  --packages org.apache.spark:spark-sql-kafka-0-10_2.13:4.0.0
                  /opt/spark-apps/streaming_job.py
volumes:
      postgres_data:
      kafka_data:
      spark-ivy:
      zookeeper_data:
      zookeeper_log: